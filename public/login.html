<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>获取 Cookie - 网易云音乐自助打卡</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 48px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    .account-selector {
      margin-bottom: 20px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .account-btn {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .account-btn:hover {
      border-color: #C20C0C;
      color: #C20C0C;
    }

    .account-btn.active {
      background: #C20C0C;
      color: white;
      border-color: #C20C0C;
    }

    .account-btn.configured {
      opacity: 0.5;
    }

    .account-btn.configured.active {
      opacity: 1;
    }

    .qr-wrapper {
      display: inline-block;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 24px;
    }

    #qrImg {
      width: 200px;
      height: 200px;
      display: block;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    .status.waiting {
      background: #fef3c7;
      color: #92400e;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
    }

    .cookie-box {
      margin-top: 24px;
      text-align: left;
    }

    .cookie-box label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }

    .env-hint {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #92400e;
    }

    .env-hint code {
      background: rgba(0,0,0,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .cookie-display {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #666;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #333;
      color: white;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #555;
    }

    .btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .refresh-btn {
      margin-top: 12px;
      padding: 8px 16px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #666;
    }

    .refresh-btn:hover {
      border-color: #C20C0C;
      color: #C20C0C;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>获取 Cookie</h1>
    <p class="subtitle">选择要配置的账号，扫码登录后获取 Cookie</p>

    <!-- 账号选择 -->
    <div id="accountSelector" class="account-selector"></div>

    <div class="qr-wrapper">
      <img id="qrImg" src="" alt="二维码加载中..." />
    </div>

    <div id="status" class="status waiting">等待扫描...</div>

    <div id="cookieBox" class="cookie-box" style="display: none;">
      <div id="envHint" class="env-hint"></div>
      <label>Cookie 值：</label>
      <div id="cookieDisplay" class="cookie-display"></div>
      <button id="copyBtn" class="btn" onclick="copyCookie()">复制 Cookie</button>
    </div>

    <p class="hint">请打开网易云音乐App，扫描上方二维码完成登录</p>
    <button class="refresh-btn" onclick="location.reload()">刷新二维码</button>
  </div>

  <script src="https://fastly.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
  <script>
    let timer
    let selectedAccount = 1 // 默认选择账号1

    // 加载已配置的账号列表
    async function loadConfig() {
      try {
        const res = await axios.get('/config/status')
        const config = res.data
        const selector = document.getElementById('accountSelector')

        // 显示 1~5 号账号按钮，标记已配置的
        let html = ''
        for (let i = 1; i <= 5; i++) {
          const configured = config.accounts.some(a => a.index === i && a.cookieConfigured)
          const isNext = !configured && config.accounts.filter(a => a.cookieConfigured).length + 1 === i
          if (isNext) selectedAccount = i

          html += `<button class="account-btn ${configured ? 'configured' : ''} ${i === selectedAccount ? 'active' : ''}" 
                        onclick="selectAccount(${i})" data-idx="${i}">
                    #${i}${configured ? ' ✓' : ''}
                  </button>`
        }
        selector.innerHTML = html
      } catch (e) {
        // 如果获取不到配置，默认选1
      }
    }

    function selectAccount(idx) {
      selectedAccount = idx
      document.querySelectorAll('.account-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.idx) === idx)
      })
      // 清除当前登录状态，重新开始
      if (timer) clearInterval(timer)
      document.getElementById('cookieBox').style.display = 'none'
      login()
    }

    async function login() {
      const statusDiv = document.getElementById('status')
      const cookie = localStorage.getItem('cookie')

      updateStatus('加载二维码...', 'waiting')

      try {
        const res = await axios({
          url: `/login/qr/key?timestamp=${Date.now()}`,
        })
        const key = res.data.data.unikey

        const res2 = await axios({
          url: `/login/qr/create?key=${key}&platform=web&qrimg=true&timestamp=${Date.now()}&ua=pc`,
        })
        document.querySelector('#qrImg').src = res2.data.data.qrimg
        updateStatus('请扫描二维码', 'waiting')

        timer = setInterval(async () => {
          const statusRes = await checkStatus(key)
          if (statusRes.code === 800) {
            updateStatus('二维码已过期，请点击刷新', 'error')
            clearInterval(timer)
          } else if (statusRes.code === 801) {
            updateStatus('二维码已扫描，请在手机上确认', 'waiting')
          } else if (statusRes.code === 802) {
            updateStatus('登录成功，正在保存信息...', 'waiting')
          } else if (statusRes.code === 803) {
            clearInterval(timer)
            updateStatus('授权登录成功！', 'success')
            localStorage.setItem('cookie', statusRes.cookie)
            showCookie(statusRes.cookie)
          }
        }, 3000)
      } catch (error) {
        console.error('登录失败:', error)
        updateStatus('二维码加载失败，请点击刷新重试', 'error')
      }
    }

    async function checkStatus(key) {
      const res = await axios({
        url: `/login/qr/check?key=${key}&timestamp=${Date.now()}&ua=pc`,
      })
      return res.data
    }

    function updateStatus(message, type) {
      const statusDiv = document.getElementById('status')
      statusDiv.textContent = message
      statusDiv.className = 'status ' + type
    }

    function showCookie(cookie) {
      const cookieBox = document.getElementById('cookieBox')
      const cookieDisplay = document.getElementById('cookieDisplay')
      const envHint = document.getElementById('envHint')
      cookieBox.style.display = 'block'

      const envName = `NETEASE_COOKIE_${selectedAccount}`
      const playlistName = `PLAYLIST_ID_${selectedAccount}`

      // 提取 MUSIC_U 的值
      const match = cookie.match(/MUSIC_U=([^;]+)/)
      const musicUValue = match ? match[1] : cookie
      const formattedCookie = `MUSIC_U=${musicUValue};`
      cookieDisplay.textContent = formattedCookie

      envHint.innerHTML = `
        请将以下变量添加到 <code>.env</code> 文件：<br>
        <strong><code>${envName}=${formattedCookie}</code></strong><br>
        <span style="font-size:12px;">听歌打卡歌单（可选）：<code>${playlistName}=你的歌单ID</code></span>
      `
    }

    async function copyCookie() {
      const cookieDisplay = document.getElementById('cookieDisplay')
      const cookie = cookieDisplay.textContent

      try {
        await navigator.clipboard.writeText(cookie)
        const copyBtn = document.getElementById('copyBtn')
        copyBtn.textContent = '已复制！'
        setTimeout(() => {
          copyBtn.textContent = '复制 Cookie'
        }, 2000)
      } catch (err) {
        alert('复制失败，请手动复制')
      }
    }

    // 检查配置状态警告
    fetch('/config/status')
      .then(r => r.json())
      .then(status => {
        if (!status.apiBaseUrl) {
          const container = document.querySelector('.container')
          const warning = document.createElement('div')
          warning.className = 'status'
          warning.style.background = '#fef3c7'
          warning.style.color = '#92400e'
          warning.style.marginTop = '20px'
          warning.textContent = '⚠️ API 基础地址未配置，请在 .env 文件中设置 API_BASE_URL'
          container.appendChild(warning)
        }
      })
      .catch(() => {})

    // 初始化
    loadConfig().then(() => login())
  </script>
</body>
</html>
